<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test 3 — Hyphae Surface</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111110; overflow:hidden; width:100vw; height:100vh; cursor:none; }
canvas { display:block; position:fixed; inset:0; }
#title {
  position:fixed; top:28px; left:36px;
  font-family:'Courier New',monospace; font-size:10px; letter-spacing:0.22em;
  color:rgba(255,255,255,0.1); text-transform:uppercase; pointer-events:none;
}
#label {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  font-family:'Courier New',monospace; font-size:10px; letter-spacing:0.22em;
  color:rgba(255,255,255,0.1); text-transform:uppercase; pointer-events:none;
}
</style>
</head>
<body>
<div id="title">Test 03 — Hyphae Surface</div>
<canvas id="c"></canvas>
<div id="label">Approach the surface — hyphae respond</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
let mouse = {x: W/2, y: H/2};

// Generate dense grid of hyphae (short upright filaments)
const COLS = 90, ROWS = 55;
let hyphae = [];

function noise(x, y) {
  return (Math.sin(x*0.7+y*0.4)*0.5 + Math.sin(x*0.3-y*0.8)*0.3 + Math.sin(x*1.3+y*1.1)*0.2 + 1) / 2;
}

function buildHyphae() {
  hyphae = [];
  const cellW = W / COLS, cellH = H / ROWS;
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const bx = col * cellW + cellW/2 + (Math.random()-0.5)*cellW*0.6;
      const by = row * cellH + cellH/2 + (Math.random()-0.5)*cellH*0.6;
      const n = noise(col*0.4, row*0.4);
      const baseLen = 6 + n * 18;
      // Each hypha has 1-3 filaments
      const count = Math.floor(Math.random()*2)+1;
      for (let k = 0; k < count; k++) {
        const baseAngle = -Math.PI/2 + (Math.random()-0.5)*0.7; // roughly upward
        hyphae.push({
          bx: bx + (Math.random()-0.5)*4,
          by,
          baseAngle,
          angle: baseAngle,
          len: baseLen * (0.7+Math.random()*0.6),
          width: Math.random()*0.8+0.2,
          opacity: 0.3 + n*0.5,
          phase: Math.random()*Math.PI*2,
          restoring: 0,
        });
      }
    }
  }
}

const REACT_RADIUS = 120;

function draw(ts) {
  requestAnimationFrame(draw);
  ctx.fillStyle = '#111110';
  ctx.fillRect(0, 0, W, H);

  ctx.lineCap = 'round';

  for (const h of hyphae) {
    const dx = h.bx - mouse.x, dy = h.by - mouse.y;
    const dist = Math.sqrt(dx*dx+dy*dy);

    if (dist < REACT_RADIUS) {
      // Bend away from mouse — more strongly the closer
      const influence = Math.pow(1 - dist/REACT_RADIUS, 1.5);
      const pushAngle = Math.atan2(dy, dx);
      const targetAngle = pushAngle + (Math.random()-0.5)*0.3;
      h.angle += (targetAngle - h.angle) * influence * 0.15;
    } else {
      // Restore to base angle with gentle sway
      const sway = Math.sin(ts*0.0008 + h.phase) * 0.06;
      h.angle += (h.baseAngle + sway - h.angle) * 0.04;
    }

    // Draw filament
    const ex = h.bx + Math.cos(h.angle) * h.len;
    const ey = h.by + Math.sin(h.angle) * h.len;

    // Gradient along filament: base darker, tip lighter
    const grad = ctx.createLinearGradient(h.bx, h.by, ex, ey);
    grad.addColorStop(0, `rgba(100,100,90,${h.opacity*0.4})`);
    grad.addColorStop(1, `rgba(220,215,200,${h.opacity})`);

    ctx.beginPath();
    ctx.moveTo(h.bx, h.by);
    // Slight curve
    const cpx = (h.bx+ex)/2 + Math.sin(h.angle+Math.PI/2)*h.len*0.15;
    const cpy = (h.by+ey)/2 + Math.cos(h.angle+Math.PI/2)*h.len*0.15;
    ctx.quadraticCurveTo(cpx, cpy, ex, ey);
    ctx.strokeStyle = grad;
    ctx.lineWidth = h.width;
    ctx.stroke();
  }

  // Cursor
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, REACT_RADIUS, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  ctx.stroke();
}

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildHyphae();
});
buildHyphae();
draw(0);
</script>
</body>
</html>
