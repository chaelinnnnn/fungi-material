<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test 2 — Spore Dust</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f0ece4; overflow:hidden; width:100vw; height:100vh; cursor:crosshair; }
canvas { display:block; position:fixed; inset:0; }
#title {
  position:fixed; top:28px; left:36px;
  font-family:'Courier New',monospace; font-size:10px; letter-spacing:0.22em;
  color:rgba(0,0,0,0.15); text-transform:uppercase; pointer-events:none;
}
#label {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  font-family:'Courier New',monospace; font-size:10px; letter-spacing:0.22em;
  color:rgba(0,0,0,0.15); text-transform:uppercase; pointer-events:none;
}
</style>
</head>
<body>
<div id="title">Test 02 — Spore Dust</div>
<canvas id="c"></canvas>
<div id="label">Click to release spores — move through the cloud to scatter</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
let mouse = {x:-999, y:-999, px:-999, py:-999};

let particles = [];

function spawnCloud(cx, cy) {
  const count = Math.floor(Math.random()*120)+80;
  for (let i = 0; i < count; i++) {
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*3+0.3;
    const size = Math.random()*2.5+0.3;
    particles.push({
      x: cx + (Math.random()-0.5)*10,
      y: cy + (Math.random()-0.5)*10,
      vx: Math.cos(angle)*speed*(Math.random()*0.8+0.2),
      vy: Math.sin(angle)*speed*(Math.random()*0.6+0.2) - Math.random()*1.5, // slight upward bias
      size,
      opacity: 0.4+Math.random()*0.5,
      settled: false,
      settleY: null,
      drift: (Math.random()-0.5)*0.03, // air drift
      phase: Math.random()*Math.PI*2,
    });
  }
}

function update() {
  for (const p of particles) {
    if (p.settled) {
      // Disturb if mouse nearby
      const dx = p.x - mouse.x, dy = p.y - mouse.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 50) {
        p.settled = false;
        const push = (50-dist)/50;
        p.vx += (dx/dist)*push*3;
        p.vy += -push*2;
        p.settleY = null;
      }
      continue;
    }

    // Gravity + air resistance + drift
    p.vy += 0.06;
    p.vx += p.drift + Math.sin(p.phase)*0.01;
    p.phase += 0.05;
    p.vx *= 0.985;
    p.vy *= 0.985;
    p.x += p.vx;
    p.y += p.vy;

    // Settle on bottom
    if (p.y >= H - p.size) {
      p.y = H - p.size;
      p.settled = true;
      p.vx = 0; p.vy = 0;
    }

    // Walls
    if (p.x < 0) { p.x = 0; p.vx *= -0.3; }
    if (p.x > W) { p.x = W; p.vx *= -0.3; }
  }
}

function draw() {
  requestAnimationFrame(draw);
  ctx.fillStyle = '#f0ece4';
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    // Settled spores slightly darker
    const bright = p.settled ? 30 : 60;
    ctx.fillStyle = `rgba(${bright},${bright},${bright},${p.opacity * (p.settled ? 0.7 : 1)})`;
    ctx.fill();
  }

  update();
}

canvas.addEventListener('click', e => spawnCloud(e.clientX, e.clientY));
window.addEventListener('mousemove', e => {
  mouse.px = mouse.x; mouse.py = mouse.y;
  mouse.x = e.clientX; mouse.y = e.clientY;
  if (e.buttons === 1) spawnCloud(e.clientX, e.clientY);
});
window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });
draw();
</script>
</body>
</html>
